<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 10px;
      background: #111;
      color: #fff;
    }
    h2 {
      margin-top: 5px;
      font-size: 16px;
      color: #ff3b3b;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 8px;
      background: #222;
      border-radius: 6px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover {
      background: #22c55e;
    }
  </style>
</head>
<body>
  <h2>Time = Asset Tracker</h2>
  <div id="stats">
    Loading...
  </div>
  <button id="dashboardBtn" class="btn">View Full Dashboard</button>
  <script src="popup.js"></script>
</body>
</html>
