<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 10px;
      background: #111;
      color: #fff;
    }
    h2 {
      margin-top: 5px;
      font-size: 16px;
      color: #3b82f6;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 8px;
      background: #222;
      border-radius: 6px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h2>HP & ToDo Tracker</h2>
  <div id="stats">
    Loading...
  </div>
  <button id="dashboardBtn" class="btn">View Full Dashboard</button>
  <script src="popup.js"></script>
</body>
</html>
