<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACCESS DENIED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
            cursor: default;
        }

        /* CRTスキャンライン効果 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.18) 0px,
                    rgba(0, 0, 0, 0.18) 1px,
                    transparent 1px,
                    transparent 3px);
            pointer-events: none;
            z-index: 100;
        }

        /* 画面端の CRT ビネット */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.75) 100%);
            pointer-events: none;
            z-index: 99;
        }

        /* ===== ACCESS DENIED ===== */
        .access-denied {
            font-size: clamp(2.5rem, 9vw, 7.5rem);
            font-weight: 900;
            color: #ff0000;
            text-shadow:
                0 0 10px #ff0000,
                0 0 30px #ff0000,
                0 0 60px #cc0000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            animation: blink 1.4s step-end infinite;
            margin-bottom: 2.5rem;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            45%,
            55% {
                opacity: 0.15;
            }
        }

        /* ===== ターミナルログ ===== */
        .terminal {
            width: min(680px, 90vw);
            background: rgba(0, 20, 0, 0.6);
            border: 1px solid #00ff41;
            border-radius: 4px;
            padding: 1.4rem 1.8rem;
            font-size: clamp(0.75rem, 1.8vw, 1rem);
            line-height: 2.2;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2);
        }

        .line {
            display: flex;
            gap: 0.6em;
        }

        .prompt {
            color: #00ff41;
            flex-shrink: 0;
        }

        .label {
            color: #888;
            flex-shrink: 0;
        }

        .value-red {
            color: #ff4444;
            font-weight: bold;
        }

        .value-orange {
            color: #ff8c00;
            font-weight: bold;
        }

        .value-green {
            color: #00ff41;
        }

        .value-dim {
            color: #555;
        }

        /* タイプアニメーション */
        .typed {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid transparent;
        }

        .typed.active {
            border-right-color: #00ff41;
            animation: cursor-blink 0.7s step-end infinite;
        }

        @keyframes cursor-blink {

            0%,
            100% {
                border-right-color: #00ff41;
            }

            50% {
                border-right-color: transparent;
            }
        }

        /* ===== ボタン ===== */
        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2.2rem;
        }

        .btn {
            padding: 0.7rem 2rem;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.12em;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .btn-close {
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        .btn-close:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 14px #ff0000;
        }

        .btn-back {
            border: 2px solid #00ff41;
            color: #00ff41;
        }

        .btn-back:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 14px #00ff41;
        }

        /* ===== カウントダウン ===== */
        .countdown {
            margin-top: 1.5rem;
            color: #444;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .countdown span {
            color: #ff4444;
        }
    </style>
</head>

<body>

    <div class="access-denied">⛔ ACCESS DENIED</div>

    <div class="terminal" id="terminal">
        <!-- JavaScriptで動的に行を追加 -->
    </div>

    <div class="buttons">
        <button id="btn-close" class="btn btn-close">[ TAB を閉じる ]</button>
        <button id="btn-back" class="btn btn-back">[ 前のページへ ]</button>
    </div>

    <div class="countdown" id="countdown"></div>

    <script src="blocked.js"></script>
</body>

</html>
